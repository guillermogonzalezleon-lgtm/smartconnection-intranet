name: CI — Intranet QAS

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}

      - name: Lighthouse CI (solo develop)
        if: github.ref == 'refs/heads/develop'
        run: |
          npm install -g @lhci/cli 2>/dev/null
          lhci autorun \
            --collect.url=https://qas.smconnection.cl \
            --assert.preset=lighthouse:recommended \
            --assert.assertions.categories:performance=warn \
            --assert.assertions.categories:accessibility=error \
            --assert.assertions.categories:best-practices=warn \
            2>&1 | tail -15 || echo "⚠️ Lighthouse no bloqueante"

      - name: Tag deploy (solo main)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          TAG="deploy-intranet-$(date +%Y.%m.%d)-$(printf '%03d' $GITHUB_RUN_NUMBER)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $TAG
          git push origin $TAG
          echo "✅ Tag: $TAG"

      - name: Smoke test post-deploy (solo main)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "⏳ Esperando deploy Amplify (4 min)..."
          sleep 240
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://intranet.smconnection.cl)
          if [ "$STATUS" = "200" ]; then
            echo "✅ Smoke test OK — intranet.smconnection.cl responde $STATUS"
          else
            echo "🔴 Smoke test FALLÓ — status $STATUS"
            exit 1
          fi

      - name: Deploy log (solo main)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          TAG="deploy-intranet-$(date +%Y.%m.%d)-$(printf '%03d' $GITHUB_RUN_NUMBER)"
          echo "{\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"project\":\"intranet\",\"commit\":\"$GITHUB_SHA\",\"tag\":\"$TAG\",\"result\":\"success\",\"url\":\"https://intranet.smconnection.cl\",\"actor\":\"$GITHUB_ACTOR\"}" \
            >> deploy-entries.json
          echo "✅ Deploy log entry creada"
