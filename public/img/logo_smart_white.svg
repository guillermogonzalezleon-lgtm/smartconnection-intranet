<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 40" fill="none">
  <defs>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00c1c1"/>
      <stop offset="100%" stop-color="#0077b6"/>
    </linearGradient>
    <filter id="g">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Cloud icon scaled to match text -->
  <g transform="translate(0, 0) scale(0.95)" filter="url(#g)">
    <path d="M24 34H10a9 9 0 0 1-.8-17.9A12.5 12.5 0 0 1 33.5 19 9 9 0 0 1 32 36"
          stroke="url(#cyanGrad)" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="13" cy="25" r="3" fill="#00c1c1"/>
    <circle cx="22" cy="18" r="3" fill="#ffffff"/>
    <circle cx="30" cy="26" r="3" fill="#0077b6"/>
    <line x1="15.5" y1="24" x2="20" y2="19.5" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <line x1="24" y1="19.5" x2="28" y2="25" stroke="#00c1c1" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- SMART in white -->
  <text x="42" y="26" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="20" font-weight="800" fill="#ffffff" letter-spacing="2.5" textLength="92" lengthAdjust="spacing">SMART</text>
  <!-- CONNECTION in cyan gradient -->
  <text x="140" y="26" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="20" font-weight="800" fill="url(#cyanGrad)" letter-spacing="2.5" textLength="235" lengthAdjust="spacing">CONNECTION</text>
</svg>
